# Policy review workflow for GitHub Actions
# Runs DevSecOps policy enforcement on pipeline and GitOps manifests
# Fails the job on policy failure; archives artifacts for review

name: Policy Review

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  policy-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install agent
        run: pip install -e .

      - name: Run policy review
        id: review
        run: |
          mkdir -p artifacts
          ai-devsecops-agent review \
            --platform github \
            --pipeline .github/workflows/test.yml \
            --gitops examples/insecure-argo-application.yaml \
            --policy policies/self-review.yaml \
            --output markdown \
            --out artifacts/report.md \
            --artifact-dir artifacts \
            --include-comments \
            --include-remediations
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: policy-review-artifacts
          path: artifacts/
          retention-days: 7

      - name: Fail on policy failure
        if: steps.review.outcome == 'failure'
        run: exit 1
